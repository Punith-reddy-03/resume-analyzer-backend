# ============================================
# ACTIVE PROFILE
# ============================================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ============================================
# SPRING BOOT APPLICATION PROPERTIES
# ============================================

# Application Name
spring.application.name=backend

# ============================================
# SERVER CONFIGURATION
# ============================================
server.port=8080

# ============================================
# DATABASE CONFIGURATION (Local Development)
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/resume_analyzer?useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=resume_user
spring.datasource.password=resume_password
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / HIBERNATE CONFIGURATION
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================
# LOGGING CONFIGURATION
# ============================================
logging.level.com.resumeanalyzer=DEBUG
logging.level.org.springframework.web=INFO

# ============================================
# FILE UPLOAD CONFIGURATION
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

